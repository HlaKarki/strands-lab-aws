AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: System Design Interview Coach - Multi-Agent System

Globals:
  Function:
    Timeout: 300
    MemorySize: 1024
    Runtime: python3.11
    Architectures:
      - x86_64

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod

Resources:
  # DynamoDB Table
  ProgressTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub SystemDesignProgress
      AttributeDefinitions:
        - AttributeName: user_id
          AttributeType: S
      KeySchema:
        - AttributeName: user_id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # Lambda Function
  OrchestratorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub system-design-coach-${Environment}
      CodeUri: .
      Handler: handler.lambda_handler
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref ProgressTable
          BEDROCK_MODEL_ID: moonshotai.kimi-k2.5
      Policies:
        # DynamoDB permissions
        - DynamoDBCrudPolicy:
            TableName: !Ref ProgressTable
        # Bedrock permissions
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource: '*'
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            Path: /chat
            Method: POST
            ApiId: !Ref HttpApi

  # HTTP API Gateway
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Environment
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowHeaders:
          - content-type
        AllowMethods:
          - POST
          - OPTIONS

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/chat'

  TableName:
    Description: DynamoDB Table Name
    Value: !Ref ProgressTable